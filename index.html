<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: #ffffff;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 14px;
        }

        /* Username Box: Ab Password jaise color mein hai par round hai */
        .input-user {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #dbdbdb;
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
            background: #f8fafc;
            color: #262626;
        }

        /* Password Box: Normal corners ke sath */
        .input-pass {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #dbdbdb;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            background: #f8fafc;
            color: #262626;
        }

        /* Blue Log In Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #007fff;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:active {
            opacity: 0.8;
        }

        .forgot-link {
            display: block;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #00376b;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="input-group">
            <input type="text" id="username" class="input-user" placeholder="Username or Email" required>
        </div>
        
        <div class="input-group">
            <input type="password" id="password" class="input-pass" placeholder="Password" required>
        </div>
        
        <button class="login-btn" id="submitBtn">Log in</button>
        
        <a href="#" class="forgot-link">Forgotten password?</a>
    </div>

    <script src="app.js"></script>
</body>
</html>
